<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subscription API Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .premium-badge { background-color: #ffd700; color: #000; font-size: 0.8rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .cursor-pointer { cursor: pointer; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row">
        <div class="col-md-4">
            <div class="card mb-4 shadow-sm">
                <div class="card-header bg-primary text-white">Login (JWT Auth)</div>
                <div class="card-body" id="auth-section">
                    <input type="text" id="username" class="form-control mb-2" placeholder="Username">
                    <input type="password" id="password" class="form-control mb-2" placeholder="Password">
                    <button class="btn btn-primary w-100" onclick="login()">Login</button>
                    <div id="login-error" class="text-danger mt-2" style="display: none;"></div>
                </div>
                <div class="card-body text-center" id="logged-in-section" style="display: none;">
                    <p>Logged in as: <strong id="display-user"></strong></p>
                    <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-secondary text-white">Search & Filter</div>
                <div class="card-body">
                    <input type="text" id="search" class="form-control mb-2" placeholder="Search keywords...">
                    <select id="source" class="form-control mb-2">
                        <option value="">All Sources</option>
                        <option value="TechBlog">TechBlog</option>
                        <option value="FinanceNews">FinanceNews</option>
                        <option value="HealthDaily">HealthDaily</option>
                    </select>
                    <button class="btn btn-secondary w-100" onclick="loadArticles()">Apply Filters</button>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            
            <div class="card mb-4 shadow d-none border-primary" id="article-detail-card">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <span id="detail-meta"></span>
                    <button class="btn btn-sm btn-light" onclick="closeDetail()">Close Article</button>
                </div>
                <div class="card-body">
                    <h2 id="detail-title" class="mb-3"></h2>
                    <div id="detail-content" class="fs-5" style="white-space: pre-wrap;"></div>
                </div>
            </div>

            <h3>Latest Articles</h3>
            <div id="article-list" class="mb-3">
                </div>

            <div class="d-flex justify-content-between align-items-center mb-5 p-3 bg-white border rounded shadow-sm">
                <button id="btn-prev" class="btn btn-outline-secondary" onclick="loadPreviousPage()" disabled>
                    &laquo; Previous
                </button>
                <span id="pagination-info" class="text-muted fw-bold"></span>
                <button id="btn-next" class="btn btn-outline-secondary" onclick="loadNextPage()" disabled>
                    Next &raquo;
                </button>
            </div>

        </div>
    </div>
</div>

<script>
    const API_BASE = '/api/';
    
    // --- Global State for Pagination ---
    let nextPageUrl = null;
    let prevPageUrl = null;

    // --- Authentication Logic ---
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        try {
            const response = await fetch(`${API_BASE}token/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('username', username);
                document.getElementById('login-error').style.display = 'none';
                updateAuthUI();
                // Reload articles in case a premium one is currently open
                loadArticles(); 
            } else {
                document.getElementById('login-error').innerText = "Invalid credentials. Please try again.";
                document.getElementById('login-error').style.display = 'block';
            }
        } catch (error) {
            console.error("Login failed:", error);
        }
    }

    function logout() {
        localStorage.removeItem('access_token');
        localStorage.removeItem('username');
        updateAuthUI();
        closeDetail(); 
        loadArticles(); // Refresh list to revert to unauthenticated view
    }

    function updateAuthUI() {
        const token = localStorage.getItem('access_token');
        if (token) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('logged-in-section').style.display = 'block';
            document.getElementById('display-user').innerText = localStorage.getItem('username');
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('logged-in-section').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
    }

    // --- API Fetching Logic ---
    function getHeaders() {
        const headers = { 'Content-Type': 'application/json' };
        const token = localStorage.getItem('access_token');
        if (token) headers['Authorization'] = `Bearer ${token}`;
        return headers;
    }

    // loadArticles now optionally takes a direct URL (used by pagination buttons)
    async function loadArticles(fetchUrl = null) {
        let url = fetchUrl;
        
        // If no URL is provided, build it from the search/filter inputs
        if (!url) {
            const search = document.getElementById('search').value;
            const source = document.getElementById('source').value;
            
            url = `${API_BASE}articles/?`;
            if (search) url += `search=${search}&`;
            if (source) url += `source=${source}&`;
        }

        try {
            const response = await fetch(url, { headers: getHeaders() });
            const data = await response.json();
            
            // 1. Update Pagination State
            nextPageUrl = data.next;
            prevPageUrl = data.previous;
            
            document.getElementById('btn-prev').disabled = !prevPageUrl;
            document.getElementById('btn-next').disabled = !nextPageUrl;
            document.getElementById('pagination-info').innerText = `Total Articles: ${data.count}`;

            // 2. Render Article List
            const listDiv = document.getElementById('article-list');
            listDiv.innerHTML = ''; 

            if (data.results.length === 0) {
                listDiv.innerHTML = '<p class="text-muted">No articles found matching your criteria.</p>';
                return;
            }

            data.results.forEach(article => {
                const isPremium = article.is_premium ? '<span class="premium-badge ms-2">PREMIUM</span>' : '';
                listDiv.innerHTML += `
                    <div class="card mb-2 shadow-sm border-0 cursor-pointer" onclick="readArticle(${article.id})">
                        <div class="card-body hover-bg-light">
                            <h5 class="card-title text-primary">${article.title} ${isPremium}</h5>
                            <div class="d-flex justify-content-between">
                                <span class="text-muted small">Source: ${article.source}</span>
                                <span class="text-muted small">${new Date(article.created_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        } catch (error) {
            console.error("Failed to load articles:", error);
        }
    }

    // Pagination Click Handlers
    function loadNextPage() {
        if (nextPageUrl) loadArticles(nextPageUrl);
    }

    function loadPreviousPage() {
        if (prevPageUrl) loadArticles(prevPageUrl);
    }

    // --- Article Detail Logic ---
    async function readArticle(id) {
        try {
            const response = await fetch(`${API_BASE}articles/${id}/`, { headers: getHeaders() });
            const article = await response.json();

            document.getElementById('detail-title').innerText = article.title;
            document.getElementById('detail-meta').innerText = `${article.source} | ${new Date(article.created_at).toLocaleDateString()}`;
            document.getElementById('detail-content').innerText = article.content; // The serializer handles the paywall message securely!
            
            document.getElementById('article-detail-card').classList.remove('d-none');
            
            // Smooth scroll to the top of the article
            document.getElementById('article-detail-card').scrollIntoView({ behavior: 'smooth' });
        } catch (error) {
            console.error("Failed to fetch article details:", error);
        }
    }

    function closeDetail() {
        document.getElementById('article-detail-card').classList.add('d-none');
    }

    // Initialize on page load
    updateAuthUI();
    loadArticles();
</script>

<style>
    /* Quick hover effect for the article list cards */
    .hover-bg-light:hover { background-color: #f8f9fa; border-radius: 4px; }
</style>
</body>
</html>
